server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy webhook calls to n8n (server-to-server, avoids browser mixed-content)
    location /proxy/apply {
        proxy_pass http://n8n-h9545em8h1see0ph3bk4suog.159.89.47.141.sslip.io/webhook/talent-apply;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 60s;
    }

    # Panel API proxy — forwards /panel-api/<path> to n8n webhook/<path>
    location /panel-api/ {
        proxy_pass http://n8n-h9545em8h1see0ph3bk4suog.159.89.47.141.sslip.io/webhook/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
